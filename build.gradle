        "architectury.common.json",
        "endterraforged.accesswidener"
]

def fabricCommonResourceEntries = [
        "endterraforged.accesswidener"
]

def verifyCommonResourceManifest = {
    def resourcesDir = project(":common").file("src/main/resources")
    def sourceEntries = project.fileTree(resourcesDir).matching {
        include "**/*"
    }.files.collect { file ->
        resourcesDir.toPath().relativize(file.toPath()).toString().replace(File.separator, "/")
    }.sort()
    def classifiedEntries = (criticalCommonResourceEntries + commonTransformOnlyEntries).toSet()

    def unclassifiedEntries = sourceEntries.findAll { entry -> !classifiedEntries.contains(entry) }
    if (!unclassifiedEntries.isEmpty()) {
        throw new GradleException(
                "common resources must be classified in verifyReleaseArtifacts before release:\n"
                        + unclassifiedEntries.join("\n"))
    }

    def missingSourceEntries = classifiedEntries.findAll { entry -> !sourceEntries.contains(entry) }.sort()
    if (!missingSourceEntries.isEmpty()) {
        throw new GradleException(
                "verifyReleaseArtifacts lists common resources that no longer exist:\n"
                        + missingSourceEntries.join("\n"))
    }

    logger.lifecycle("Verified common resource manifest: ${sourceEntries.size()} resources classified")
}

def commonTransformJar = { String loader ->
    project(":common").tasks.named("transformProduction${loader}").get().archiveFile.get().asFile
}

def verifyReleaseJar = { String label, File jarFile, List<String> entries ->
    if (!jarFile.isFile()) {
        throw new GradleException("Missing ${label}: ${jarFile}")
    }
    if (jarFile.length() < 1024L) {
        throw new GradleException("${label} is unexpectedly small: ${jarFile} (${jarFile.length()} bytes)")
    }

    def zip = new java.util.zip.ZipFile(jarFile)
    try {
        entries.each { entry ->
            if (zip.getEntry(entry) == null) {
                throw new GradleException("${label} ${jarFile.name} is missing ${entry}")
            }
        }
    } finally {
        zip.close()
    }

    logger.lifecycle("Verified ${label}: ${jarFile}")
}

def readJarEntryText = { String label, File jarFile, String entry ->
    def zip = new java.util.zip.ZipFile(jarFile)
    try {
        def zipEntry = zip.getEntry(entry)
        if (zipEntry == null) {
            throw new GradleException("${label} ${jarFile.name} is missing ${entry}")
        }
        return zip.getInputStream(zipEntry).getText("UTF-8")
    } finally {
        zip.close()
    }
}

def requireMetadataValue = { String label, String name, Object actual, Object expected ->
    if (actual != expected) {
        throw new GradleException("${label} metadata ${name} expected ${expected}, got ${actual}")
    }
}

def requireMetadataListContains = { String label, String name, Object actual, Object expected ->
    if (!(actual instanceof Collection) || !actual.contains(expected)) {
        throw new GradleException("${label} metadata ${name} must contain ${expected}, got ${actual}")
    }
}

def requireNoUnexpandedPlaceholders = { String label, String entry, String text ->
    if (text.contains('${')) {
        throw new GradleException("${label} metadata ${entry} contains an unexpanded Gradle placeholder")
    }
}

def verifyFabricMetadata = { File jarFile ->
    def label = "Fabric release jar"
    def metadataText = readJarEntryText(label, jarFile, "fabric.mod.json")
    requireNoUnexpandedPlaceholders(label, "fabric.mod.json", metadataText)
    def metadata = new groovy.json.JsonSlurper().parseText(metadataText)
    requireMetadataValue(label, "schemaVersion", metadata.schemaVersion, 1)
    requireMetadataValue(label, "id", metadata.id, rootProject.mod_id)
    requireMetadataValue(label, "version", metadata.version, rootProject.mod_version)
    requireMetadataValue(label, "name", metadata.name, "EndTerraForged")
    requireMetadataValue(label, "license", metadata.license, "LGPL-3.0-or-later")
    requireMetadataValue(label, "environment", metadata.environment, "*")
    requireMetadataListContains(label, "authors", metadata.authors, "Knowledge-book-QwQ")
    requireMetadataValue(label, "contact.repo", metadata.contact.repo,
            "https://github.com/Knowledge-book-QwQ/EndTerraForged")
    requireMetadataValue(label, "contact.issues", metadata.contact.issues,
            "https://github.com/Knowledge-book-QwQ/EndTerraForged/issues")
    requireMetadataListContains(label, "entrypoints.main", metadata.entrypoints.main,
            "endterraforged.fabric.EndTerraForgedFabric")
    requireMetadataListContains(label, "mixins", metadata.mixins, "endterraforged-common.mixins.json")
    requireMetadataListContains(label, "mixins", metadata.mixins, "endterraforged-fabric.mixins.json")
    requireMetadataValue(label, "depends.fabricloader", metadata.depends.fabricloader,
            ">=${rootProject.fabric_loader_version}".toString())
    requireMetadataValue(label, "depends.fabric", metadata.depends.fabric,
            ">=${rootProject.fabric_api_version}".toString())
    requireMetadataValue(label, "depends.minecraft", metadata.depends.minecraft,
            ">=${rootProject.minecraft_version}".toString())
    logger.lifecycle("Verified Fabric metadata: ${metadata.id} ${metadata.version}")
}

def verifyNeoForgeMetadata = { File jarFile ->
    def label = "NeoForge release jar"
    def metadata = readJarEntryText(label, jarFile, "META-INF/neoforge.mods.toml")
    requireNoUnexpandedPlaceholders(label, "META-INF/neoforge.mods.toml", metadata)
    def expected = [
            "modLoader=\"javafml\"",
            "loaderVersion=\"[4,)\"",
            "license=\"LGPL-3.0-or-later\"",
            "config = \"endterraforged-common.mixins.json\"",
            "config = \"endterraforged-neoforge.mixins.json\"",
            "modId=\"${rootProject.mod_id}\"".toString(),
            "displayName=\"EndTerraForged\"",
            "version=\"${rootProject.mod_version}\"".toString(),
            "authors=\"Knowledge-book-QwQ\"",
            "displayURL=\"https://github.com/Knowledge-book-QwQ/EndTerraForged/\"",
            "issueTrackerURL=\"https://github.com/Knowledge-book-QwQ/EndTerraForged/issues\"",
            "description=\"An End-dimension terrain worldgen mod inspired by ReTerraForged.\"",
            "modId=\"neoforge\"",
            "versionRange=\"[${rootProject.neoforge_version},)\"".toString(),
            "modId = \"minecraft\"",
            "versionRange = \"[${rootProject.minecraft_version},)\"".toString()
    ]
    expected.each { token ->
        if (!metadata.contains(token)) {
            throw new GradleException("${label} metadata is missing expected token: ${token}")
        }
    }
    logger.lifecycle("Verified NeoForge metadata: ${rootProject.mod_id} ${rootProject.mod_version}")
}

def gitOutputLines = { List<String> args ->
    def output = new ByteArrayOutputStream()
    exec {
        commandLine(["git"] + args)
        standardOutput = output
    }
    return output.toString("UTF-8").readLines().findAll { line -> !line.isBlank() }
}

def pathCategory = { String path ->
    if (path.startsWith("common/src/main/java/")) return "common main Java"
    if (path.startsWith("common/src/main/resources/")) return "common resources"
    if (path.startsWith("common/src/test/java/")) return "common tests"
    if (path.startsWith("fabric/src/main/")) return "Fabric source/resources"
    if (path.startsWith("neoforge/src/main/")) return "NeoForge source/resources"
    if (path.startsWith("docs/")) return "docs"
    if (path.endsWith(".md")) return "root docs"
    if (path.endsWith(".gradle") || path == "gradle.properties" || path == "settings.gradle") return "Gradle config"
    return "other"
}

def logGroupedPaths = { String title, List<String> paths ->
    logger.lifecycle("${title}: ${paths.size()}")
    paths.groupBy(pathCategory).sort { left, right -> left.key <=> right.key }.each { category, grouped ->
        logger.lifecycle("  ${category}: ${grouped.size()}")
        grouped.take(12).each { path -> logger.lifecycle("    ${path}") }
        if (grouped.size() > 12) {
            logger.lifecycle("    ... ${grouped.size() - 12} more")
        }
    }
}

tasks.register("reportRepositoryHygiene") {
    group = "verification"
    description = "Reports release hygiene risks from git without failing the build."

    doLast {
        def trackedIgnored = gitOutputLines(["ls-files", "-ci", "--exclude-standard"])
        def untracked = gitOutputLines(["ls-files", "--others", "--exclude-standard"])
        def changed = gitOutputLines(["status", "--short", "--untracked-files=no"])

        logGroupedPaths("Tracked files matched by .gitignore", trackedIgnored)
        logGroupedPaths("Untracked release-relevant files", untracked)
        logGroupedPaths("Tracked working-tree changes", changed.collect { line ->
            line.length() > 3 ? line.substring(3) : line
        })

        logger.lifecycle("Repository hygiene report complete. Run :verifyRepositoryHygiene before staging a release.")
    }
}

tasks.register("verifyRepositoryHygiene") {
    group = "verification"
    description = "Fails if tracked ignored files or untracked release-relevant files remain before a release commit."

    doLast {
        def trackedIgnored = gitOutputLines(["ls-files", "-ci", "--exclude-standard"])
        def untracked = gitOutputLines(["ls-files", "--others", "--exclude-standard"])
        def failures = []

        if (!trackedIgnored.isEmpty()) {
            failures.add("Tracked files are now matched by .gitignore and must be removed from the index:\n"
                    + trackedIgnored.join("\n"))
        }
        if (!untracked.isEmpty()) {
            failures.add("Untracked release-relevant files remain. Stage, intentionally ignore, or remove them:\n"
                    + untracked.take(80).join("\n")
                    + (untracked.size() > 80 ? "\n... ${untracked.size() - 80} more" : ""))
        }
        if (!failures.isEmpty()) {
            throw new GradleException(failures.join("\n\n"))
        }

        logger.lifecycle("Repository hygiene verified: no tracked ignored files or untracked release-relevant files")
    }
}

tasks.register("verifyReleaseArtifacts") {
    group = "verification"
    description = "Builds and verifies common transform jars plus Fabric/NeoForge release jars contain required classes and resources."

    dependsOn ":common:transformProductionFabric", ":common:transformProductionNeoForge",
            ":fabric:remapJar", ":neoforge:remapJar"

    doLast {
        verifyCommonResourceManifest()

        def criticalCommonJarEntries = criticalCommonEntries + criticalCommonResourceEntries
        def criticalCommonTransformEntries = criticalCommonJarEntries + commonTransformOnlyEntries
        verifyReleaseJar("common Fabric transform jar", commonTransformJar("Fabric"), criticalCommonTransformEntries)
        verifyReleaseJar("common NeoForge transform jar", commonTransformJar("NeoForge"), criticalCommonTransformEntries)
        verifyReleaseJar("Fabric release jar", project(":fabric").tasks.named("remapJar").get().archiveFile.get().asFile, [
                "fabric.mod.json",
                "endterraforged-fabric.mixins.json",
                "endterraforged/fabric/EndTerraForgedFabric.class"
        ] + criticalCommonJarEntries + fabricCommonResourceEntries)
        def fabricReleaseJar = project(":fabric").tasks.named("remapJar").get().archiveFile.get().asFile
        def neoForgeReleaseJar = project(":neoforge").tasks.named("remapJar").get().archiveFile.get().asFile
        verifyReleaseJar("NeoForge release jar", neoForgeReleaseJar, [
                "META-INF/neoforge.mods.toml",
                "endterraforged-neoforge.mixins.json",
                "endterraforged/neoforge/EndTerraForgedNeoForge.class",
                "endterraforged/neoforge/client/EndTerraForgedClientScreens.class",
                "endterraforged/neoforge/client/ExistingWorldPresetEditorLauncher.class",
                "endterraforged/neoforge/client/LdLib2ActionBar.class"
        ] + criticalCommonJarEntries)
        verifyFabricMetadata(fabricReleaseJar)
        verifyNeoForgeMetadata(neoForgeReleaseJar)
    }
}
