plugins {
    id "architectury-plugin" version "3.4.164"
    id "dev.architectury.loom" version "1.11.445" apply false
}

architectury {
    minecraft = rootProject.minecraft_version
}

subprojects {
    apply plugin: "dev.architectury.loom"

    loom {
        silentMojangMappingsLicense()
        if (project.name == "common") {
            accessWidenerPath = project.file("src/main/resources/endterraforged.accesswidener")
        }
    }

    dependencies {
        minecraft "com.mojang:minecraft:${rootProject.minecraft_version}"
        mappings loom.officialMojangMappings()
    }
}

allprojects {
    apply plugin: "java"
    apply plugin: "architectury-plugin"
    apply plugin: "maven-publish"

    archivesBaseName = rootProject.archives_base_name
    version = rootProject.mod_version
    group = rootProject.maven_group

    repositories {
        mavenCentral {
            content {
                includeGroup "com.electronwill.night-config"
                includeGroup "org.junit.jupiter"
                includeGroup "org.junit.platform"
                includeGroup "org.apiguardian"
                includeGroup "org.opentest4j"
            }
        }
        maven {
            url "https://maven.fabricmc.net/"
            content {
                includeGroup "net.fabricmc"
                includeGroup "net.fabricmc.fabric-api"
            }
        }
        maven {
            url "https://maven.architectury.dev/"
            content {
                includeGroupByRegex "dev\\.architectury.*"
            }
        }
        maven {
            url "https://maven.shedaniel.me"
            content {
                includeGroupByRegex "me\\.shedaniel.*"
                includeGroupByRegex "dev\\.architectury.*"
            }
        }
        maven {
            url 'https://maven.minecraftforge.net/'
            content {
                includeGroup "net.minecraftforge"
            }
        }
    }

    tasks.withType(JavaCompile) {
        options.encoding = "UTF-8"
        options.release = 21
    }

    java {
        withSourcesJar()
    }
}

def releaseVerificationRequested = gradle.startParameter.taskNames.any { taskName ->
    taskName == "verifyReleaseArtifacts" || taskName.endsWith(":verifyReleaseArtifacts")
}

if (gradle.startParameter.configureOnDemand && releaseVerificationRequested) {
    throw new GradleException(
            "verifyReleaseArtifacts must run without --configure-on-demand because Architectury transform tasks need full project configuration.")
}

gradle.taskGraph.whenReady { graph ->
    if (gradle.startParameter.configureOnDemand && graph.hasTask(":verifyReleaseArtifacts")) {
        throw new GradleException(
                "verifyReleaseArtifacts must run without --configure-on-demand because Architectury transform tasks need full project configuration.")
    }
}

